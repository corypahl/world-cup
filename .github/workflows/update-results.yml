name: Update World Cup Results

on:
  workflow_dispatch:
  schedule:
    # 12:00 PM-1:00 AM ET during the June/July tournament window.
    - cron: "*/15 16-23 * * *"
    - cron: "*/15 0-4 * * *"
    - cron: "0 5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-world-cup-results
  cancel-in-progress: true

jobs:
  update-results:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Update team results
        run: node scripts/update-results.mjs

      - name: Validate data files
        run: |
          node --check data-loader.js
          node --check scoring.js
          node --check leaderboard.js
          node --check scripts/update-results.mjs
          node -e "const fs=require('fs'); for (const file of fs.readdirSync('data').filter((name)=>name.endsWith('.json'))) JSON.parse(fs.readFileSync('data/'+file,'utf8'));"

      - name: Commit result changes
        run: |
          if git diff --quiet -- data/team-results.json; then
            echo "No result changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/team-results.json
          git commit -m "Update World Cup results"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
